# Smithery configuration: https://smithery.ai/docs/config#smitheryyaml

name: einvoice-mcp
version: "0.1.0"
description: >
  MCP server for German e-invoice compliance (XRechnung 3.0 / ZUGFeRD 2.x).
  Validate, generate, parse, and check compliance of electronic invoices
  per EN 16931 with full German business rule support.
author: Tim Löhr
repository: https://github.com/Mavengence/einvoice-mcp
license: MIT

build:
  dockerBuildPath: docker/

startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      kositUrl:
        type: string
        default: "http://localhost:8081"
        description: URL of the KoSIT Validator (requires separate Docker container).

commandFunction:
  |-
  (config) => ({
    command: 'python',
    args: ['-m', 'einvoice_mcp'],
    env: {
      KOSIT_URL: config.kositUrl || 'http://localhost:8081'
    }
  })
