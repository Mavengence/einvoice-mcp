services:
  - type: web
    name: einvoice-mcp
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: python -m einvoice_mcp
    envVars:
      - key: MCP_TRANSPORT
        value: streamable-http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PORT
        value: "10000"
      - key: PYTHON_VERSION
        value: "3.11.11"
