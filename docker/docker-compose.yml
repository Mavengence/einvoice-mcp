services:
  kosit:
    build:
      context: .
      dockerfile: Dockerfile.kosit
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/server/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  mcp-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # MCP uses stdio transport — no port mapping needed.
    # Connect via: docker exec -i <container> python -m einvoice_mcp
    stdin_open: true
    environment:
      - KOSIT_URL=http://kosit:8081
      - LOG_LEVEL=INFO
    depends_on:
      kosit:
        condition: service_healthy
    restart: unless-stopped
